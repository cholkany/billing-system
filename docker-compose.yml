
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8787
    depends_on:
      - backend
    networks:
      - billing_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/mikrotik_billing
      - JWT_SECRET=supersecret123
      - PORT=8787
    depends_on:
      - postgres
    networks:
      - billing_net

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mikrotik_billing
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - billing_net

networks:
  billing_net:
    driver: bridge

volumes:
  db_data:
